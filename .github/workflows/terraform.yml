name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  TF_VERSION:          "1.13.4"

jobs:
  # ── Job 1: Lint & Validate ─────────────────────────────────────────
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Init TFLint
        run: tflint --init
        working-directory: environments/dev

      - name: Run TFLint dev
        run: tflint --chdir=environments/dev

      - name: Run TFLint prod
        run: tflint --chdir=environments/prod

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: .
          soft_fail: true

      - name: Validate dev
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: environments/dev

      - name: Validate prod
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: environments/prod

  # ── Job 2: Plan Dev ────────────────────────────────────────────────
  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="admin_password=${{ secrets.DEV_VM_PASSWORD }}" \
            -out=dev.tfplan \
            -no-color | tee plan-dev.txt
        working-directory: environments/dev

      - name: Upload plan output
        uses: actions/upload-artifact@v4
        with:
          name: plan-dev
          path: |
            environments/dev/dev.tfplan
            environments/dev/plan-dev.txt

  # ── Job 3: Plan Prod ───────────────────────────────────────────────
  plan-prod:
    name: Plan Prod
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/prod

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="admin_password=${{ secrets.PROD_VM_PASSWORD }}" \
            -out=prod.tfplan \
            -no-color | tee plan-prod.txt
        working-directory: environments/prod

      - name: Upload plan output
        uses: actions/upload-artifact@v4
        with:
          name: plan-prod
          path: |
            environments/prod/prod.tfplan
            environments/prod/plan-prod.txt

  # ── Job 4: Apply Dev (auto on push to main) ────────────────────────
  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: plan-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="admin_password=${{ secrets.DEV_VM_PASSWORD }}" \
            -auto-approve
        working-directory: environments/dev

  # ── Job 5: Apply Prod (manual approval required) ───────────────────
  apply-prod:
    name: Apply Prod
    runs-on: ubuntu-latest
    needs: [plan-prod, apply-dev]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/prod

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="admin_password=${{ secrets.PROD_VM_PASSWORD }}" \
            -auto-approve
        working-directory: environments/prod